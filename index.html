<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>極簡交通路線管家</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fadeIn 0.3s ease-out forwards;
    }
  </style>
</head>
<body class="bg-white font-sans selection:bg-blue-100 min-h-screen relative text-gray-800">
  
  <div id="app"></div>

  <script type="module">
    // --- SVG 圖示庫 ---
    const icons = {
      chevronLeft: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>`,
      plus: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>`,
      trash: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>`,
      mapPin: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>`,
      route: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="19" r="3"></circle><path d="M9 19h8.5a3.5 3.5 0 0 0 0-7h-11a3.5 3.5 0 0 1 0-7H15"></path><circle cx="18" cy="5" r="3"></circle></svg>`,
      arrowUp: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>`,
      arrowDown: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline></svg>`,
      spinner: `<svg class="animate-spin w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`
    };

    // --- 全域狀態管理 ---
    const state = {
      view: 'lists',
      lists: [],
      routes: {},
      activeListId: null,
      loading: false,
      errorMsg: '',
      isCloudReady: true
    };

    const STORAGE_KEY = 'travel_planner_data';

    const getActiveList = () => state.lists.find(l => l.id === state.activeListId);

    function render() {
      const appContainer = document.getElementById('app');
      if (state.view === 'lists') {
        appContainer.innerHTML = renderListsView();
      } else if (state.view === 'detail' && getActiveList()) {
        appContainer.innerHTML = renderDetailView();
      }
    }

    function renderListsView() {
      let content = '';
      if (state.lists.length === 0) {
        content = `<div class="text-center py-10 text-gray-400">目前還沒有清單喔</div>`;
      } else {
        content = state.lists.map(list => `
          <div onclick="window.handleOpenList(${list.id})" class="group flex items-center justify-between p-4 bg-white border border-gray-100 rounded-xl hover:border-blue-200 hover:shadow-sm cursor-pointer transition-all mb-3">
            <div>
              <h2 class="text-lg font-medium text-gray-800 group-hover:text-blue-700 transition-colors">${list.name}</h2>
              <p class="text-sm text-gray-400 mt-1">${list.locations ? list.locations.length : 0} 個地點</p>
            </div>
            <div class="text-gray-300 group-hover:text-blue-400">
              <div class="rotate-180">${icons.chevronLeft}</div>
            </div>
          </div>
        `).join('');
      }

      return `
        <div class="max-w-2xl mx-auto w-full p-6 animate-fade-in">
          <div class="flex justify-between items-end border-b border-gray-200 pb-4 mb-6">
            <h1 class="text-3xl font-light text-gray-800 tracking-wide">行程清單</h1>
            <button onclick="window.handleAddList()" class="flex items-center gap-1 text-blue-600 hover:text-blue-800 transition-colors text-sm font-medium">
              ${icons.plus} 新增清單
            </button>
          </div>
          <div class="space-y-3">
            ${content}
          </div>
        </div>
      `;
    }

    function renderDetailView() {
      const activeList = getActiveList();
      const currentRoutes = state.routes[state.activeListId];
      
      let locationsContent = '';
      if (!activeList.locations || activeList.locations.length === 0) {
        locationsContent = `<div class="text-center py-12 text-gray-400 font-light">尚未新增任何地點</div>`;
      } else {
        locationsContent = activeList.locations.map((loc, idx) => {
          
          let routeContent = '';
          if (idx < activeList.locations.length - 1) {
            
            let routeDetails = '';
            if (currentRoutes && currentRoutes[idx] && currentRoutes[idx].options) {
              routeDetails = `<div class="space-y-3 bg-gray-50 rounded-lg p-4 border border-gray-100">`;
              routeDetails += currentRoutes[idx].options.map(opt => `
                <div class="bg-white p-3 rounded border border-gray-100 flex flex-col sm:flex-row sm:items-center justify-between gap-2 shadow-sm text-sm">
                  <div class="flex-1">
                    <div class="font-medium text-gray-800 mb-1 flex items-center gap-1.5">
                      <span>${opt.label || '推薦方案'}</span>
                    </div>
                    <div class="text-gray-600">
                      <span class="font-semibold text-blue-700">${opt.transport}</span>
                      <span class="mx-2 text-gray-300">|</span>
                      ${opt.details}
                    </div>
                  </div>
                  <div class="flex sm:flex-col items-center sm:items-end gap-3 sm:gap-1 text-gray-500 shrink-0">
                    <span class="bg-gray-100 px-2 py-0.5 rounded text-xs font-medium">${opt.time}</span>
                    <span class="font-medium">${opt.price}</span>
                  </div>
                </div>
              `).join('');
              routeDetails += `</div>`;
            } else {
              routeDetails = `<div class="text-sm text-gray-400 italic flex items-center gap-2">往下一個地點</div>`;
            }

            routeContent = `
              <div class="ml-7 border-l-2 border-dashed border-gray-200 py-6 pl-8 pr-2 relative my-1">
                <div class="absolute -left-[9px] top-1/2 -translate-y-1/2 w-4 h-4 bg-white border-2 border-gray-200 rounded-full"></div>
                ${routeDetails}
              </div>
            `;
          }

          return `
            <div class="relative">
              <div class="flex items-center gap-3 bg-white border border-gray-200 p-4 rounded-xl shadow-sm z-10 relative">
                <div class="w-6 h-6 rounded-full bg-blue-50 border border-blue-200 text-blue-600 flex items-center justify-center text-xs font-bold shrink-0">
                  ${idx + 1}
                </div>
                <div class="flex-1 text-gray-800 font-medium text-lg truncate">${loc}</div>
                
                <div class="flex items-center gap-1 shrink-0 text-gray-300">
                  <button onclick="window.handleMoveLocation(${idx}, 'up')" ${idx === 0 ? 'disabled' : ''} class="hover:text-blue-500 disabled:opacity-20 disabled:hover:text-gray-300 p-1 transition-colors cursor-pointer" title="往上移">
                    ${icons.arrowUp}
                  </button>
                  <button onclick="window.handleMoveLocation(${idx}, 'down')" ${idx === activeList.locations.length - 1 ? 'disabled' : ''} class="hover:text-blue-500 disabled:opacity-20 disabled:hover:text-gray-300 p-1 transition-colors cursor-pointer" title="往下移">
                    ${icons.arrowDown}
                  </button>
                  <div class="w-[1px] h-4 bg-gray-200 mx-1"></div>
                  <button onclick="window.handleRemoveLocation(${idx})" class="hover:text-red-500 p-1 transition-colors cursor-pointer" title="刪除">
                    ${icons.trash}
                  </button>
                </div>
              </div>
              ${routeContent}
            </div>
          `;
        }).join('');
      }

      let errorContent = state.errorMsg ? `
        <div class="mt-4 p-3 bg-red-50 text-red-600 text-sm rounded-lg border border-red-100 text-center">
          ${state.errorMsg}
        </div>
      ` : '';

      let actionButton = '';
      if (activeList.locations && activeList.locations.length >= 2 && !currentRoutes) {
        if (state.loading) {
          actionButton = `
            <div class="mt-8 mb-4">
              <button disabled class="w-full py-4 rounded-xl shadow-lg font-medium flex items-center justify-center gap-2 transition-all cursor-wait bg-gray-600 text-white">
                ${icons.spinner} <span>管家正在精算路線中...</span>
              </button>
            </div>
          `;
        } else {
          actionButton = `
            <div class="mt-8 mb-4">
              <button onclick="window.handleGenerateRoutes()" class="w-full py-4 rounded-xl shadow-lg font-medium flex items-center justify-center gap-2 transition-all cursor-pointer bg-black text-white hover:bg-gray-800">
                ${icons.route} <span>開始安排路線</span>
              </button>
            </div>
          `;
        }
      }

      return `
        <div class="max-w-2xl mx-auto w-full p-6 animate-fade-in flex flex-col h-[100dvh]">
          
          <div class="flex items-center gap-4 border-b border-gray-200 pb-4 mb-6 shrink-0">
            <button onclick="window.handleBackToLists()" class="text-gray-400 hover:text-gray-800 transition-colors">
              ${icons.chevronLeft}
            </button>
            <input type="text" value="${activeList.name}" onblur="window.handleUpdateListName(event)" class="text-2xl font-light text-gray-800 bg-transparent border-none outline-none w-full placeholder-gray-300" placeholder="輸入清單名稱...">
          </div>

          <div class="flex-1 overflow-y-auto no-scrollbar relative">
            <form onsubmit="window.handleAddLocation(event)" class="mb-8 relative">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                ${icons.mapPin}
              </div>
              <input id="newLocInput" type="text" oninput="window.toggleAddBtn()" placeholder="搜尋並新增地點（例如：清水寺）..." class="w-full pl-10 pr-20 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-1 focus:ring-blue-400 focus:bg-white transition-all text-gray-700">
              <button id="addLocBtn" type="submit" disabled class="absolute inset-y-1 right-1 px-4 text-sm font-medium text-white bg-gray-800 rounded-md hover:bg-black disabled:opacity-50 transition-colors cursor-pointer">
                確認
              </button>
            </form>

            <div class="relative">
              ${locationsContent}
            </div>
            
            ${errorContent}
            ${actionButton}

            <div class="h-64 shrink-0 w-full"></div>
          </div>
        </div>
      `;
    }

    const saveToLocal = () => {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        lists: state.lists,
        routes: state.routes
      }));
    };

    const updateListsToCloud = (newLists) => {
      state.lists = newLists;
      saveToLocal();
      render();
    };

    const updateRoutesToCloud = (newRoutes) => {
      state.routes = newRoutes;
      saveToLocal();
      render();
    };
    
    window.handleBackToLists = () => {
      state.activeListId = null;
      state.view = 'lists';
      render();
    };

    window.handleOpenList = (id) => {
      state.activeListId = id;
      state.view = 'detail';
      render();
    };

    window.handleAddList = () => {
      const newList = { id: Date.now(), name: '新行程清單', locations: [] };
      updateListsToCloud([...state.lists, newList]);
      state.activeListId = newList.id;
      state.view = 'detail';
    };

    window.handleUpdateListName = (e) => {
      const activeList = getActiveList();
      if (!activeList || e.target.value.trim() === '') return;
      
      const updated = state.lists.map(l => 
        l.id === state.activeListId ? { ...l, name: e.target.value.trim() } : l
      );
      updateListsToCloud(updated);
    };

    window.toggleAddBtn = () => {
      const input = document.getElementById('newLocInput');
      const btn = document.getElementById('addLocBtn');
      if(input && btn) btn.disabled = !input.value.trim();
    };

    window.handleAddLocation = (e) => {
      e.preventDefault();
      const input = document.getElementById('newLocInput');
      const val = input.value.trim();
      if (!val) return;

      const updated = state.lists.map(l => {
        if (l.id === state.activeListId) {
          const locs = l.locations || [];
          return { ...l, locations: [...locs, val] };
        }
        return l;
      });
      
      updateListsToCloud(updated);
      updateRoutesToCloud({ ...state.routes, [state.activeListId]: null });
    };

    window.handleRemoveLocation = (index) => {
      const updated = state.lists.map(l => {
        if (l.id === state.activeListId) {
          return { ...l, locations: l.locations.filter((_, i) => i !== index) };
        }
        return l;
      });
      updateListsToCloud(updated);
      updateRoutesToCloud({ ...state.routes, [state.activeListId]: null });
    };

    window.handleMoveLocation = (index, direction) => {
      const listToUpdate = getActiveList();
      if (!listToUpdate || !listToUpdate.locations) return;

      const newLocations = [...listToUpdate.locations];
      
      if (direction === 'up' && index > 0) {
        [newLocations[index - 1], newLocations[index]] = [newLocations[index], newLocations[index - 1]];
      } else if (direction === 'down' && index < newLocations.length - 1) {
        [newLocations[index + 1], newLocations[index]] = [newLocations[index], newLocations[index + 1]];
      } else {
        return;
      }

      const updatedLists = state.lists.map(l => {
        if (l.id === state.activeListId) {
          return { ...l, locations: newLocations };
        }
        return l;
      });

      updateListsToCloud(updatedLists);
      updateRoutesToCloud({ ...state.routes, [state.activeListId]: null });
    };

    window.handleGenerateRoutes = async () => {
      const activeList = getActiveList();
      if (!activeList || !activeList.locations || activeList.locations.length < 2) return;

      state.loading = true;
      state.errorMsg = '';
      render();

      // ★注意這裡！你必須把自己的 Gemini API Key 填入雙引號中才能運作
      const apiKey = "PUBLIC_TEST_KEY"; 
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

      const systemInstruction = `你是一位專業且細心的旅遊交通規劃助手。
任務：接收使用者提供的一系列日本地點，找出準確位置，並規劃地點間的公共交通路線。
要求：
1. 嚴格把關地點真實性，絕不瞎猜。
2. 每一段移動（如A到B），提供三種方案：最方便、最快速、最省錢。
3. 務必以嚴格的JSON陣列格式回傳，不要加上任何 Markdown 語法（例如 \`\`\`json），直接輸出純 JSON 格式。`;

      const userQuery = `請幫我規劃以下地點的交通銜接：\n${activeList.locations.map((l, i) => `${i + 1}. ${l}`).join('\n')}`;

      const payload = {
        contents: [{ parts: [{ text: userQuery }] }],
        systemInstruction: { parts: [{ text: systemInstruction }] },
        tools: [{ google_search: {} }],
        generationConfig: {
          responseMimeType: "application/json",
          responseSchema: {
            type: "ARRAY",
            items: {
              type: "OBJECT",
              properties: {
                from: { type: "STRING" },
                to: { type: "STRING" },
                options: {
                  type: "ARRAY",
                  items: {
                    type: "OBJECT",
                    properties: {
                      label: { type: "STRING" },
                      transport: { type: "STRING" },
                      details: { type: "STRING" },
                      time: { type: "STRING" },
                      price: { type: "STRING" }
                    }
                  }
                }
              }
            }
          }
        }
      };

      try {
        const delays = [1000, 2000, 4000, 8000, 16000];
        let data;
        for (let i = 0; i < 5; i++) {
          try {
            const response = await fetch(url, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });
            if (!response.ok) throw new Error(`HTTP error!`);
            data = await response.json();
            break;
          } catch (e) {
            if (i === 4) throw e;
            await new Promise(resolve => setTimeout(resolve, delays[i]));
          }
        }

        const jsonText = data.candidates?.[0]?.content?.parts?.[0]?.text;
        
        if (jsonText) {
          const cleanedText = jsonText.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
          const parsedRoutes = JSON.parse(cleanedText);
          updateRoutesToCloud({ ...state.routes, [state.activeListId]: parsedRoutes });
        } else {
          throw new Error("沒有收到路線資料");
        }
      } catch (error) {
        console.error("API 錯誤或解析失敗:", error);
        state.errorMsg = '抱歉，管家在查路線時網路稍微卡住了，請確認是否有填寫正確的 API Key？';
        render();
      } finally {
        state.loading = false;
        render();
      }
    };

    function init() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          const data = JSON.parse(saved);
          if (data.lists) state.lists = data.lists;
          if (data.routes) state.routes = data.routes;
        } else {
          state.lists = [{ id: Date.now(), name: '我的日本自由行', locations: [] }];
        }
      } catch (e) {
        state.lists = [{ id: Date.now(), name: '我的日本自由行', locations: [] }];
      }
      render();
    }

    init();

  </script>
</body>
</html>
